services:
  web:
    build: ./app
    container_name: infra_demo_web
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: infra_demo
      DB_USER: demo
      DB_PASSWORD: demo123
      APP_PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: infra_demo_db
    environment:
      POSTGRES_DB: infra_demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d infra_demo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
